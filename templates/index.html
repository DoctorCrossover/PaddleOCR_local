<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddleOCR Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #eef1ff;
        }
        
        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #999;
        }
        
        #file-input {
            display: none;
        }
        
        .preview-container {
            position: relative;
            max-height: 400px;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .preview-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .image-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #ddd;
        }
        
        .results-container {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .result-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }
        
        .result-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
            word-break: break-all;
        }
        
        .result-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .confidence-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 15px;
            color: #dc2626;
            margin-top: 15px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PaddleOCR 文字识别</h1>
            <p>上传图片，快速识别图片中的文字内容</p>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h2 class="card-title">📤 上传图片</h2>
                
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽图片到此处</div>
                    <div class="upload-hint">支持 JPG、PNG、BMP 格式，最大 16MB</div>
                </div>
                <input type="file" id="file-input" accept="image/*">
                
                <div id="preview-section" style="display: none;">
                    <div class="preview-container">
                        <img id="preview-image" class="preview-image" alt="预览">
                    </div>
                    <div class="image-info" id="image-info"></div>
                    <button id="recognize-btn" class="btn btn-primary">
                        🔍 开始识别
                    </button>
                    <button id="clear-btn" class="btn btn-secondary" style="margin-left: 10px;">
                        🗑️ 清除
                    </button>
                </div>
            </div>
            
            <div class="card">
                <h2 class="card-title">📊 识别结果</h2>
                
                <div id="results-section">
                    <div style="text-align: center; padding: 40px; color: #999;">
                        <div style="font-size: 3rem; margin-bottom: 15px;">📝</div>
                        <p>上传图片后开始识别</p>
                    </div>
                </div>
                
                <div id="stats-section" style="display: none;" class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-count">0</div>
                        <div class="stat-label">识别行数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-avg-conf">0%</div>
                        <div class="stat-label">平均置信度</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previewSection = document.getElementById('preview-section');
        const previewImage = document.getElementById('preview-image');
        const imageInfo = document.getElementById('image-info');
        const recognizeBtn = document.getElementById('recognize-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultsSection = document.getElementById('results-section');
        const statsSection = document.getElementById('stats-section');
        
        let currentFile = null;
        
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                imageInfo.textContent = `${file.name} - ${(file.size / 1024 / 1024).toFixed(2)} MB`;
                uploadArea.style.display = 'none';
                previewSection.style.display = 'block';
                resultsSection.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><div style="font-size: 3rem; margin-bottom: 15px;">📝</div><p>点击"开始识别"按钮进行识别</p></div>';
                statsSection.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
        
        recognizeBtn.addEventListener('click', async () => {
            if (!currentFile) return;
            
            recognizeBtn.disabled = true;
            recognizeBtn.innerHTML = '⏳ 识别中...';
            
            resultsSection.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            const formData = new FormData();
            formData.append('file', currentFile);
            
            try {
                const response = await fetch('/api/ocr', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results);
                } else {
                    resultsSection.innerHTML = `<div class="error-message">❌ 识别失败: ${data.error}</div>`;
                }
            } catch (error) {
                resultsSection.innerHTML = `<div class="error-message">❌ 请求失败: ${error.message}</div>`;
            } finally {
                recognizeBtn.disabled = false;
                recognizeBtn.innerHTML = '🔍 开始识别';
            }
        });
        
        clearBtn.addEventListener('click', () => {
            currentFile = null;
            fileInput.value = '';
            previewSection.style.display = 'none';
            uploadArea.style.display = 'block';
            resultsSection.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><div style="font-size: 3rem; margin-bottom: 15px;">📝</div><p>上传图片后开始识别</p></div>';
            statsSection.style.display = 'none';
        });
        
        function displayResults(results) {
            if (results.length === 0) {
                resultsSection.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><div style="font-size: 3rem; margin-bottom: 15px;">🔍</div><p>未识别到文字</p></div>';
                return;
            }
            
            let html = '<div class="results-container">';
            results.forEach((result, index) => {
                const confidencePercent = (result.confidence * 100).toFixed(1);
                html += `
                    <div class="result-item">
                        <div class="result-text">${escapeHtml(result.text)}</div>
                        <div class="result-meta">
                            <span>行 ${index + 1}</span>
                            <span>置信度: ${confidencePercent}%</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            resultsSection.innerHTML = html;
            
            const avgConfidence = (results.reduce((sum, r) => sum + r.confidence, 0) / results.length * 100).toFixed(1);
            document.getElementById('stat-count').textContent = results.length;
            document.getElementById('stat-avg-conf').textContent = `${avgConfidence}%`;
            statsSection.style.display = 'flex';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
